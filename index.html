<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>이름 궁합 테스트 💕 우리 사이 몇 %?</title>
<meta name="description" content="이름 획수로 보는 두 사람의 궁합! 지금 바로 확인해보세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink-deep:#e8306a; --pink-mid:#ff6b9d; --pink-light:#ffb3cc;
  --pink-pale:#fff0f5; --peach:#ffb347; --purple:#c77dff;
  --white:#ffffff; --text-dark:#3d1a2e; --text-mid:#7a3a5a;
  --shadow:rgba(232,48,106,0.22);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(160deg,#fff0f5 0%,#ffe4f0 45%,#ffd6e7 100%);
  min-height:100vh; overflow-x:hidden; color:var(--text-dark);
}
.bg-bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;opacity:.1;animation:bubbleUp linear infinite;}
@keyframes bubbleUp{0%{transform:translateY(110vh) scale(.8);opacity:0;}10%{opacity:.1;}90%{opacity:.1;}100%{transform:translateY(-10vh) scale(1.1);opacity:0;}}

.page{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;}
.page.active{display:flex;}
#page1{padding-bottom:48px;}
.wrapper{max-width:480px;margin:0 auto;padding:0 16px;}

/* 히어로 */
.hero{text-align:center;padding:24px 0 12px;}
.hero-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--pink-deep);font-family:'Gaegu',cursive;margin-bottom:10px;}
.heart-stage{position:relative;height:110px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.main-heart{font-size:88px;display:inline-block;transform:rotate(-10deg);animation:hb 1.7s ease-in-out infinite;filter:drop-shadow(0 6px 20px rgba(232,48,106,0.42));position:relative;z-index:2;}
@keyframes hb{0%,100%{transform:rotate(-10deg) translateY(0) scale(1);}28%{transform:rotate(-8deg) translateY(-18px) scale(1.09);}50%{transform:rotate(-12deg) translateY(-7px) scale(.97);}68%{transform:rotate(-9deg) translateY(-20px) scale(1.06);}}
.sh{position:absolute;animation:shf ease-in-out infinite;opacity:.7;}
.sh:nth-child(1){font-size:22px;left:8%;top:18%;animation-duration:2.3s;}
.sh:nth-child(2){font-size:16px;left:18%;top:65%;animation-duration:3s;animation-delay:.4s;}
.sh:nth-child(3){font-size:26px;right:8%;top:12%;animation-duration:2.6s;animation-delay:.3s;}
.sh:nth-child(4){font-size:15px;right:18%;top:62%;animation-duration:2.8s;animation-delay:.8s;}
.sh:nth-child(5){font-size:13px;left:44%;top:3%;animation-duration:2.1s;animation-delay:.2s;}
@keyframes shf{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-12px) rotate(8deg);}}
.hero-title{font-family:'Gaegu',cursive;font-size:clamp(2rem,8vw,2.6rem);font-weight:700;color:var(--pink-deep);text-shadow:2px 2px 0 rgba(255,255,255,.7);line-height:1.15;margin-bottom:8px;}
.hero-sub{font-size:.82rem;color:var(--text-mid);line-height:1.65;font-weight:300;}

/* 2컬럼 폼 */
.form-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 0;}
.person-card{background:rgba(255,255,255,.82);backdrop-filter:blur(8px);border:1.5px solid rgba(255,179,204,.45);border-radius:20px;padding:16px 13px;box-shadow:0 5px 20px var(--shadow);position:relative;overflow:hidden;}
.person-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.card-me::before{background:linear-gradient(90deg,var(--pink-mid),var(--pink-deep));}
.card-them::before{background:linear-gradient(90deg,var(--purple),#9c4dff);}
.card-tag{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 11px;border-radius:20px;display:inline-block;margin-bottom:8px;}
.card-me .card-tag{background:rgba(232,48,106,.1);color:var(--pink-deep);border:1px solid rgba(232,48,106,.25);}
.card-them .card-tag{background:rgba(199,125,255,.1);color:var(--purple);border:1px solid rgba(199,125,255,.25);}
.card-sub{font-size:.82rem;color:var(--text-mid);margin-bottom:10px;font-weight:400;}
.field{margin-bottom:10px;}.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:5px;}
.field input{width:100%;background:rgba(255,255,255,.9);border:1.5px solid var(--pink-light);border-radius:11px;padding:11px 10px;font-size:1rem;font-family:'Gaegu',cursive;font-weight:700;color:var(--text-dark);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.field input::placeholder{color:#d4aec0;font-weight:400;}
.field input:focus{border-color:var(--pink-mid);box-shadow:0 0 0 3px rgba(255,107,157,.14);}
/* 날짜: 년/월/일 세로 3줄 → 한 줄 셀렉트로 */
.date-col{display:flex;flex-direction:column;gap:5px;}
.sel-w{position:relative;}
.sel-w::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#c0a0b0;pointer-events:none;}
.sel-w select{width:100%;background:rgba(255,255,255,.9);border:1.5px solid var(--pink-light);border-radius:11px;padding:10px 26px 10px 11px;font-size:.9rem;font-family:'Gaegu',cursive;font-weight:700;color:var(--text-dark);outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;transition:border-color .2s;}
.sel-w select:focus{border-color:var(--pink-mid);}
/* 년월 한 줄 */
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;}

.btn-cta{width:100%;padding:17px;background:linear-gradient(135deg,var(--pink-mid),var(--pink-deep));border:none;border-radius:18px;font-size:1.05rem;font-weight:700;font-family:'Gaegu',cursive;color:white;cursor:pointer;letter-spacing:.5px;box-shadow:0 7px 24px var(--shadow);transition:transform .15s;position:relative;overflow:hidden;margin-top:14px;}
.btn-cta::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);}
.btn-cta:active{transform:scale(.98);}
.btn-cta:disabled{opacity:.55;cursor:not-allowed;}
.loading-dots{display:inline-flex;gap:5px;align-items:center;}
.loading-dots span{width:6px;height:6px;background:white;border-radius:50%;animation:dp 1s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{transform:scale(.5);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.disclaimer{text-align:center;font-size:.7rem;color:#c0a0b0;margin-top:14px;line-height:1.65;font-weight:300;}

/* PAGE 2 */
#page2{padding-bottom:56px;}
.p2-wrap{max-width:480px;margin:0 auto;padding:0 16px;}
.stroke-section{padding-top:20px;}
.sec-title{font-family:'Gaegu',cursive;font-size:1.15rem;color:var(--pink-deep);text-align:center;margin-bottom:16px;}

/* 글자 행 */
.chars-row{
  display:flex;justify-content:center;align-items:flex-end;
  gap:3px;flex-wrap:nowrap;min-height:110px;margin-bottom:20px;
  overflow:hidden;
  width:100%;
}
.char-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:0;transform:translateY(16px);
  transition:opacity .3s,transform .3s;
  flex:0 0 auto;
}
.char-item.show{opacity:1;transform:translateY(0);}
.char-canvas-box{
  /* 크기는 JS에서 동적으로 설정 */
  background:rgba(255,255,255,.92);
  border-radius:12px;
  border:2px solid var(--pink-light);
  box-shadow:0 3px 12px var(--shadow);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.char-item.p1 .char-canvas-box{border-color:rgba(232,48,106,.55);}
.char-item.p2 .char-canvas-box{border-color:rgba(199,125,255,.55);}
.char-canvas{display:block;}

.char-count{font-family:'Gaegu',cursive;font-weight:700;line-height:1;}
.char-item.p1 .char-count{color:var(--pink-deep);}
.char-item.p2 .char-count{color:var(--purple);}
.char-count-label{font-size:.6rem;color:var(--text-mid);}

/* 계산 캔버스 */
.calc-card{background:rgba(255,255,255,.85);border:1.5px solid rgba(255,179,204,.4);border-radius:20px;padding:18px 10px;margin-bottom:14px;box-shadow:0 4px 16px var(--shadow);overflow:hidden;}
.calc-title{font-family:'Gaegu',cursive;font-size:1rem;color:var(--text-mid);text-align:center;margin-bottom:14px;}
#calcCanvas{display:block;margin:0 auto;max-width:100%;}
.ad-slot{background:rgba(255,255,255,.7);border:1px dashed var(--pink-light);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--text-mid);font-size:11px;letter-spacing:1px;}

/* 결과 카드 */
.result-card{background:linear-gradient(135deg,#fff0f7,#ffe8f2);border:2px solid var(--pink-light);border-radius:24px;padding:28px 20px;margin-bottom:14px;text-align:center;box-shadow:0 10px 36px var(--shadow);position:relative;overflow:hidden;}
.result-card::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(255,107,157,.15),transparent 70%);border-radius:50%;pointer-events:none;}
.r-names{font-size:.8rem;color:var(--text-mid);margin-bottom:14px;font-weight:500;}
.r-names span{color:var(--pink-deep);font-weight:700;}
.r-pct-wrap{margin:6px 0 12px;line-height:1;}
.r-pct{font-family:'Gaegu',cursive;font-size:clamp(4rem,20vw,6rem);font-weight:700;background:linear-gradient(135deg,var(--pink-mid),var(--pink-deep),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.r-sym{font-family:'Gaegu',cursive;font-size:clamp(1.6rem,7vw,2.2rem);font-weight:700;color:var(--pink-deep);}
.r-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-family:'Gaegu',cursive;font-size:.9rem;font-weight:700;border:1px solid;margin-bottom:16px;}
.r-comment{background:rgba(255,255,255,.75);border-radius:14px;padding:14px;text-align:left;font-size:.87rem;line-height:1.85;color:var(--text-dark);font-weight:300;}
.r-comment strong{color:var(--pink-deep);font-weight:700;}

.action-col{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.btn-s{padding:14px;border:none;border-radius:14px;font-size:.85rem;font-weight:700;font-family:'Gaegu',cursive;cursor:pointer;transition:transform .15s;}
.btn-s:active{transform:scale(.97);}
.btn-kakao{background:#FEE500;color:#3C1E1E;}
.btn-copy{background:rgba(255,255,255,.8);color:var(--pink-deep);border:1.5px solid var(--pink-light);}
.btn-retry{padding:14px;background:transparent;border:1.5px solid var(--pink-light);border-radius:14px;color:var(--text-mid);font-size:.88rem;font-weight:500;font-family:'Gaegu',cursive;cursor:pointer;transition:background .2s;}
.btn-retry:hover{background:var(--pink-pale);}

.particle{position:fixed;pointer-events:none;z-index:999;font-size:1.2rem;animation:pfly 1.4s ease-out forwards;}
@keyframes pfly{0%{transform:translateY(0) scale(0);opacity:1;}40%{transform:translateY(-52px) scale(1.2);opacity:1;}100%{transform:translateY(-130px) scale(.4);opacity:0;}}

@media(max-width:360px){.form-cols{grid-template-columns:1fr;}.hero-title{font-size:1.8rem;}.main-heart{font-size:72px;}}
</style>
<script>
// roundRect 폴리필 (iOS Safari 구버전 대응)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}
</script>
</head>
<body>
<div class="bg-bubbles" id="bgBubbles"></div>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="wrapper">
    <div class="hero">
      <p class="hero-eyebrow">✦ name compatibility ✦</p>
      <div class="heart-stage">
        <span class="sh">💕</span><span class="sh">🩷</span>
        <span class="sh">💗</span><span class="sh">💖</span><span class="sh">✨</span>
        <span class="main-heart">❤️</span>
      </div>
      <h1 class="hero-title">이름 궁합 테스트</h1>
      <p class="hero-sub">획수로 알아보는 우리 사이 케미 💘<br><span style="font-size:.74rem;color:#c0a0b0;">어릴 때 그 궁합, 기억하죠? 추억 소환 🫶</span></p>
    </div>

    <div class="form-cols">
      <div class="person-card card-me">
        <span class="card-tag">ME 💕</span>
        <p class="card-sub">나는 누구? 🙋</p>
        <div class="field">
          <label>이름</label>
          <input type="text" id="name1" placeholder="홍길동 (2~6자)" maxlength="6" autocomplete="off" inputmode="text">
        </div>
        <div class="field">
          <label>생년월일</label>
          <div class="sel-w" style="margin-bottom:5px;">
            <select id="y1"><option value="">년도 선택</option></select>
          </div>
          <div class="date-row">
            <div class="sel-w"><select id="m1"><option value="">월</option></select></div>
            <div class="sel-w"><select id="d1"><option value="">일</option></select></div>
          </div>
        </div>
      </div>
      <div class="person-card card-them">
        <span class="card-tag">THEM 💜</span>
        <p class="card-sub">그 사람은? 💭</p>
        <div class="field">
          <label>이름</label>
          <input type="text" id="name2" placeholder="김여진 (2~6자)" maxlength="6" autocomplete="off" inputmode="text">
        </div>
        <div class="field">
          <label>생년월일</label>
          <div class="sel-w" style="margin-bottom:5px;">
            <select id="y2"><option value="">년도 선택</option></select>
          </div>
          <div class="date-row">
            <div class="sel-w"><select id="m2"><option value="">월</option></select></div>
            <div class="sel-w"><select id="d2"><option value="">일</option></select></div>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-cta" id="btnCheck" onclick="startCheck()">💘 궁합 확인하기</button>
    <p class="disclaimer">※ 순수 재미용입니다. 실제 궁합과 무관해요 😄</p>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="p2-wrap">
    <div class="stroke-section">
      <p class="sec-title" id="secTitle">✏️ 획수 계산 중...</p>
      <div class="chars-row" id="charsRow"></div>

      <div class="calc-card" id="calcCard" style="display:none;">
        <p class="calc-title">🔢 궁합 계산 과정</p>
        <canvas id="calcCanvas"></canvas>
      </div>

      <!-- 광고: 계산 과정 보는 동안 -->
      <div id="adCalc" style="display:none;margin-bottom:14px;">
        <div class="ad-slot" style="height:100px;">
          <span>📢 광고 영역 (계산 중 — 이탈 최저)</span>
        </div>
      </div>

      <div class="result-card" id="resultCard" style="display:none;">
        <p class="r-names" id="rNames"></p>
        <div class="r-pct-wrap">
          <span class="r-pct" id="rPct">0</span><span class="r-sym">%</span>
        </div>
        <div class="r-badge" id="rBadge"></div>
        <div class="r-comment" id="rComment"></div>
      </div>

      <!-- 결과 하단 광고 -->
      <div id="adResult" style="display:none;margin-bottom:14px;">
        <div class="ad-slot" style="height:250px;">
          <span>📢 광고 영역 (결과 하단 — CTR 최고)</span>
        </div>
      </div>

      <div class="action-col" id="actionBtns" style="display:none;">
        <div class="share-row">
          <button class="btn-s btn-kakao" onclick="shareKakao()">💬 카카오 공유</button>
          <button class="btn-s btn-copy" onclick="copyLink()">🔗 링크 복사</button>
        </div>
        <button class="btn-retry" onclick="retry()">↩ 다시 해볼게요</button>
      </div>

      <p class="disclaimer">※ 이 서비스는 순수한 재미를 위한 것입니다<br>실제 궁합과 무관하니 가볍게 즐겨주세요!</p>
    </div>
  </div>
</div>

<script>
// ── 드롭다운 초기화 ──
function initSelects(){
  const cy=new Date().getFullYear();
  ['y1','y2'].forEach(id=>{const s=document.getElementById(id);for(let y=cy;y>=1930;y--)s.innerHTML+=`<option value="${y}">${y}년</option>`;});
  ['m1','m2'].forEach(id=>{const s=document.getElementById(id);for(let m=1;m<=12;m++)s.innerHTML+=`<option value="${m}">${m}월</option>`;});
  [['d1','y1','m1'],['d2','y2','m2']].forEach(([d,y,m])=>{
    fillDays(d,null,null);
    document.getElementById(y).addEventListener('change',()=>fillDays(d,document.getElementById(y).value,document.getElementById(m).value));
    document.getElementById(m).addEventListener('change',()=>fillDays(d,document.getElementById(y).value,document.getElementById(m).value));
  });
}
function fillDays(did,yr,mo){
  const s=document.getElementById(did);const prev=s.value;
  const max=(yr&&mo)?new Date(yr,mo,0).getDate():31;
  s.innerHTML='<option value="">일</option>';
  for(let d=1;d<=max;d++)s.innerHTML+=`<option value="${d}">${d}일</option>`;
  if(prev&&parseInt(prev)<=max)s.value=prev;
}
initSelects();

// ── 획수 테이블 ──
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNG=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const STR={'ㄱ':2,'ㄲ':4,'ㄴ':2,'ㄷ':3,'ㄸ':6,'ㄹ':5,'ㅁ':4,'ㅂ':4,'ㅃ':8,'ㅅ':2,'ㅆ':4,'ㅇ':1,'ㅈ':3,'ㅉ':6,'ㅊ':4,'ㅋ':3,'ㅌ':4,'ㅍ':4,'ㅎ':3,'ㅏ':2,'ㅐ':3,'ㅑ':3,'ㅒ':4,'ㅓ':2,'ㅔ':3,'ㅕ':3,'ㅖ':4,'ㅗ':2,'ㅘ':4,'ㅙ':5,'ㅚ':3,'ㅛ':3,'ㅜ':2,'ㅝ':4,'ㅞ':5,'ㅟ':3,'ㅠ':3,'ㅡ':1,'ㅢ':2,'ㅣ':1,'':0,'ㄳ':4,'ㄵ':5,'ㄶ':5,'ㄺ':7,'ㄻ':9,'ㄼ':9,'ㄽ':7,'ㄾ':9,'ㄿ':8,'ㅀ':8,'ㅄ':6};
function gcs(ch){
  const code=ch.charCodeAt(0);
  if(code<0xAC00||code>0xD7A3)return 1;
  const idx=code-0xAC00;
  return (STR[CHO[Math.floor(idx/(21*28))]]||2)+(STR[JUNG[Math.floor((idx%(21*28))/28)]]||1)+(STR[JONG[idx%28]]||0);
}

// 짧은 이름을 긴 이름 길이만큼 반복으로 채우기
// 예) 김여(2자) + 홍길동(3자) → 김여김(3자)
function padName(name, targetLen) {
  let result = '';
  while (result.length < targetLen) result += name;
  return [...result.slice(0, targetLen)];
}

// 애니메이션: n1 전체 먼저, 그 다음 n2
// 계산 순서: 섞인 순서 (홍김길여동진...)
function buildSequence(n1, n2) {
  const maxLen = Math.max(n1.length, n2.length);
  const a = padName(n1, maxLen);  // 짧으면 반복, 길면 그대로
  const b = padName(n2, maxLen);

  // animSeq: n1 전체 먼저 등장, 그다음 n2
  // calcIdx: 섞인 순서에서의 위치 (n1[0]→0, n2[0]→1, n1[1]→2, n2[1]→3 ...)
  const animSeq = [
    ...a.map((ch,i) => ({ch, p:1, calcIdx: i*2})),
    ...b.map((ch,i) => ({ch, p:2, calcIdx: i*2+1}))
  ];
  const calcSeq = [...animSeq].sort((x,y) => x.calcIdx - y.calcIdx);
  return { animSeq, calcSeq };
}

// 궁합 계산 (섞인 순서 그대로)
function calcCompat(strokes){
  let nums=strokes.map(n=>n%10);
  const steps=[nums.slice()];
  while(nums.length>2){
    const next=[];
    for(let i=0;i<nums.length-1;i++){
      const s=nums[i]+nums[i+1];
      next.push(s>=10?Math.floor(s/10)+s%10:s);
    }
    nums=next;steps.push(nums.slice());
  }
  return{percent:nums[0]*10+nums[1],steps};
}

// 사운드
let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function playStroke(){
  if(!actx)return;
  try{
    const buf=actx.createBuffer(1,actx.sampleRate*.07,actx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(actx.sampleRate*.025));
    const src=actx.createBufferSource(),g=actx.createGain(),f=actx.createBiquadFilter();
    f.type='bandpass';f.frequency.value=1000+Math.random()*600;f.Q.value=.8;
    g.gain.setValueAtTime(.14,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.06);
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(actx.destination);src.start();
  }catch(e){}
}
function playCalc(){
  if(!actx)return;
  try{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';o.frequency.setValueAtTime(500+Math.random()*350,actx.currentTime);
    g.gain.setValueAtTime(.06,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.09);
    o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.09);
  }catch(e){}
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// 글자를 canvas에 크레파스 스타일로 그리기
// 핵심: canvas text + 거친 stroke 효과
// ══════════════════════════════════════
function drawCharCrayon(canvas, ch, color, progress) {
  const dpr = window.devicePixelRatio || 1;
  const size = canvas.width / dpr;   // CSS 논리 크기
  const ctx = canvas.getContext('2d');
  // 매번 완전히 초기화 (물리 픽셀 기준)
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  if (progress <= 0) return;

  // ctx는 이미 animateChars에서 scale(dpr,dpr) 됐으므로
  // 논리 좌표(size)로 그리기
  const fontSize = Math.floor(size * 0.66);
  const cx = size / 2;
  const cy = size / 2;

  ctx.save();
  ctx.font = `700 ${fontSize}px 'Gaegu', cursive`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 크레파스 레이어 효과
  const layers = [
    { dx:0,    dy:0,    alpha:0.88 },
    { dx:0.7,  dy:0.3,  alpha:0.22 },
    { dx:-0.5, dy:0.55, alpha:0.18 },
    { dx:0.3,  dy:-0.6, alpha:0.15 },
  ];
  for (const layer of layers) {
    ctx.save();
    ctx.globalAlpha = layer.alpha * progress;
    ctx.fillStyle = color;
    if (layer.dx === 0) { ctx.shadowColor = color; ctx.shadowBlur = 1.2; }
    ctx.fillText(ch, cx + layer.dx, cy + layer.dy);
    ctx.restore();
  }

  // 왼→오 그려지는 효과 (progress < 1)
  if (progress < 1) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    const grd = ctx.createLinearGradient(0, 0, size, 0);
    grd.addColorStop(Math.max(0, progress - 0.08), 'rgba(0,0,0,0)');
    grd.addColorStop(Math.min(1, progress + 0.05), 'rgba(0,0,0,1)');
    grd.addColorStop(1, 'rgba(0,0,0,1)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, size, size);
    ctx.restore();
  }

  // 노이즈 질감
  ctx.save();
  ctx.globalCompositeOperation = 'source-atop';
  ctx.globalAlpha = 0.07;
  for (let i = 0; i < 50; i++) {
    const nx = Math.random() * size, ny = Math.random() * size;
    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.5)';
    ctx.fillRect(nx, ny, Math.random()*3+0.5, Math.random()*1.5+0.3);
  }
  ctx.restore();
  ctx.restore();
}

// ── 글자 하나씩 크레파스로 그려지며 등장 ──
// animSeq 순서(홍길동김여진)대로 등장하되,
// DOM 삽입 위치는 calcIdx(홍0,김1,길2,여3,동4,진5) 기준으로 끼워넣음
async function animateChars(animSeq) {
  const container = document.getElementById('charsRow');
  const p1color = '#e8306a';
  const p2color = '#c77dff';

  const totalSlots = animSeq.length;

  // 컨테이너 너비 기준으로 글자 박스 크기 동적 계산
  const containerW = container.parentElement.clientWidth || window.innerWidth - 32 || 340;
  const gap = 3;
  const boxSize = Math.max(40, Math.min(58, Math.floor((containerW - gap * (totalSlots - 1) - 4) / totalSlots)));
  const fontSize = Math.max(12, Math.floor(boxSize * 0.38));
  const countFontSize = Math.max(1.15, boxSize * 0.030); // rem

  // 빈 슬롯 placeholder 미리 생성
  const slots = [];
  for (let s = 0; s < totalSlots; s++) {
    const placeholder = document.createElement('div');
    placeholder.style.width = boxSize + 'px';
    placeholder.style.height = (boxSize + 36) + 'px';
    placeholder.style.visibility = 'hidden';
    placeholder.style.flex = '0 0 auto';
    container.appendChild(placeholder);
    slots.push(placeholder);
  }

  for (let i = 0; i < animSeq.length; i++) {
    const {ch, p, calcIdx} = animSeq[i];
    const totalStrokes = gcs(ch);
    const color = p === 1 ? p1color : p2color;

    // DOM 생성
    const item = document.createElement('div');
    item.className = `char-item p${p}`;

    const box = document.createElement('div');
    box.className = 'char-canvas-box';
    box.style.width = boxSize + 'px';
    box.style.height = boxSize + 'px';

    const cvs = document.createElement('canvas');
    cvs.className = 'char-canvas';
    const dpr = window.devicePixelRatio || 1;
    const sz = boxSize;
    cvs.width = sz * dpr;
    cvs.height = sz * dpr;
    cvs.style.width = sz + 'px';
    cvs.style.height = sz + 'px';
    const cvsCtx = cvs.getContext('2d');
    cvsCtx.scale(dpr, dpr);

    box.appendChild(cvs);

    const countEl = document.createElement('div');
    countEl.className = 'char-count';
    countEl.style.fontSize = countFontSize + 'rem';
    countEl.textContent = '0';

    const labelEl = document.createElement('div');
    labelEl.className = 'char-count-label';
    labelEl.textContent = '획';

    item.appendChild(box);
    item.appendChild(countEl);
    item.appendChild(labelEl);

    // calcIdx 위치의 placeholder를 실제 아이템으로 교체
    container.replaceChild(item, slots[calcIdx]);
    slots[calcIdx] = item;

    await sleep(20);
    item.classList.add('show');
    await sleep(80);

    // 크레파스 글자 그려지는 애니메이션 (획수만큼 스텝)
    const animSteps = totalStrokes;
    for (let s = 1; s <= animSteps; s++) {
      playStroke();
      const progress = s / animSteps;
      drawCharCrayon(cvs, ch, color, progress);
      countEl.textContent = s;
      await sleep(Math.max(40, 90 - totalStrokes * 3));
    }
    // 최종: 완성된 글자 확실히 그리기
    drawCharCrayon(cvs, ch, color, 1);
    countEl.textContent = totalStrokes;
    await sleep(180);
  }
}

// ── 계산 캔버스 ──
async function drawCalcCanvas(seq, strokes, steps) {
  const canvas = document.getElementById('calcCanvas');
  const ctx    = canvas.getContext('2d');
  const dpr    = window.devicePixelRatio || 1;
  const W      = Math.min(document.getElementById('calcCard').clientWidth - 16, 460);
  const n      = steps[0].length;

  // ── 레이아웃 계산 ──
  // R_LAST가 원 중심에서 양쪽으로 나가므로, CELL * n + 패딩 2개가 W 안에 들어와야 함
  // 패딩: 양쪽 R_LAST + 여백
  const R_EST  = Math.max(16, Math.min(20, ((W - 8) / n) * 0.38));
  const R_LAST_EST = Math.round(R_EST * 1.4);
  const CELL   = Math.floor((W - R_LAST_EST * 2 - 8) / n);
  const R      = Math.max(14, Math.min(18, CELL * 0.38));   // 일반 원
  const R_LAST = Math.round(R * 1.4);                        // 마지막 원

  // 행 구조: 원 영역 + 계산식 영역 (고정 높이)
  const CIRC_H    = R * 2 + 6;    // 원 영역
  const FORMULA_H = 30;           // 계산식 텍스트 영역
  const ROW_H     = CIRC_H + FORMULA_H;  // 한 행 = 일정!

  // 마지막 행은 원(R_LAST) + % 텍스트 — 충분한 여백 확보
  const PCT_H   = 56;
  // 마지막 행 원은 R_LAST로 더 크므로 별도 계산
  const TOTAL_H = ROW_H * (steps.length - 1) + (R_LAST * 2 + 6) + PCT_H + 24;

  canvas.style.width  = W + 'px';
  canvas.style.height = TOTAL_H + 'px';
  canvas.width  = W * dpr;
  canvas.height = TOTAL_H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, TOTAL_H);

  const p1c = '#e8306a', p2c = '#c77dff';

  // 계산식 폰트: 셀 너비에 맞게, 최소 10px
  const calcFontSz = Math.max(10, Math.min(12, CELL * 0.23));
  const calcFont   = `700 ${calcFontSz}px 'Gaegu',cursive`;
  const numFontSz  = Math.max(13, R * 0.88);
  const numFont    = `700 ${numFontSz}px 'Gaegu',cursive`;

  // row별 원의 y 좌표 (마지막 행은 R_LAST 고려)
  function cY(row) {
    const isLastRow = row === steps.length - 1;
    const baseY = R + 6 + row * ROW_H;
    // 마지막 행: 이전 행들과 ROW_H 간격 유지하되 R_LAST만큼 추가 여백
    return isLastRow ? baseY + (R_LAST - R) : baseY;
  }
  // row별 계산식 y (원 아래)
  function fY(row) { return R + 6 + row * ROW_H + R + 4; }
  // row별 원들의 시작 x — 원이 캔버스 밖으로 나가지 않도록 보정
  function sX(rN, isLastRow) {
    const pad = isLastRow ? R_LAST + 4 : R + 4;
    const rawStart = (W - CELL * rN) / 2 + CELL / 2;
    return Math.max(pad, rawStart);
  }

  for (let row = 0; row < steps.length; row++) {
    const nums   = steps[row];
    const rN     = nums.length;
    const isLast = row === steps.length - 1;
    const curR   = isLast ? R_LAST : R;
    const sx     = sX(rN, isLast);
    const cy     = cY(row);

    if (row === 0) {
      // ── 첫 행: 원 순서대로 팝 등장 ──
      for (let i = 0; i < rN; i++) {
        const x = sx + i * CELL;
        const person = seq[i]?.p || 1;
        // 팝 효과
        drawCircNum(ctx, x, cy, curR*1.25, nums[i], person, false, p1c, p2c,
          `700 ${numFontSz*1.2}px 'Gaegu',cursive`);
        await sleep(40);
        ctx.clearRect(x-curR*1.5, cy-curR*1.5, curR*3, curR*3);
        drawCircNum(ctx, x, cy, curR, nums[i], person, false, p1c, p2c, numFont);
        await sleep(35);
      }

    } else {
      // ── 2행 이후: 계산식 → 화살표 → 결과원 순서 ──
      const prev = steps[row-1];
      const pN   = prev.length;
      const psx  = sX(pN, false);
      const prevCY = cY(row-1);
      const formulaY = fY(row-1);  // 이전 행 원 바로 아래

      for (let i = 0; i < rN; i++) {
        playCalc();

        const lx = psx + i * CELL;           // 왼쪽 원 x
        const rx = psx + (i+1) * CELL;       // 오른쪽 원 x
        const midX = (lx + rx) / 2;          // 두 원 중간 x
        const destX = sx + i * CELL;         // 결과 원 x

        const a   = prev[i], b = prev[i+1];
        const sum = a + b;
        const rd  = sum >= 10 ? Math.floor(sum/10) + sum%10 : sum;
        const result = sum >= 10 ? rd : sum;

        // ① 아치 연결선 (두 원 → 가운데 아래)
        const arcMidY = formulaY - 2;
        await drawArcLine(ctx, lx, prevCY+R, rx, prevCY+R, midX, arcMidY);

        // ② 계산식 텍스트 (중간 x, formula 영역)
        // 각 계산식이 자기 셀 중앙에만 표시되도록 clipRect
        const cellLeft  = midX - CELL*0.48;
        const cellRight = midX + CELL*0.48;

        ctx.save();
        ctx.beginPath();
        ctx.rect(cellLeft, formulaY-2, cellRight-cellLeft, FORMULA_H);
        ctx.clip();

        ctx.font = calcFont;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        const eq = sum >= 10 ? `${a}+${b}=${sum}` : `${a}+${b}=${sum}`;
        const eqW = ctx.measureText(eq).width + 8;

        // 배경
        ctx.fillStyle = 'rgba(255,240,245,0.92)';
        roundRect(ctx, midX - eqW/2, formulaY, eqW, calcFontSz+6, 4);
        ctx.fill();

        // 텍스트
        ctx.fillStyle = 'rgba(120,50,80,.75)';
        ctx.fillText(eq, midX, formulaY+1);
        ctx.restore();

        await sleep(65);

        // ③ 화살표: 계산식 아래 → 결과 원 위 (수직!)
        const arrowSY = formulaY + calcFontSz + 9;
        const arrowEY = cy - curR - 3;
        await drawStraightArrow(ctx, destX, arrowSY, destX, arrowEY);
        await sleep(35);

        // ④ 결과 원 팝 등장
        drawCircNum(ctx, destX, cy, curR*1.22, result, 0, false, p1c, p2c,
          `700 ${numFontSz*1.15}px 'Gaegu',cursive`);
        await sleep(45);
        ctx.clearRect(destX-curR*1.4, cy-curR*1.4, curR*2.8, curR*2.8);
        drawCircNum(ctx, destX, cy, curR, result, 0, false, p1c, p2c, numFont);
        await sleep(40);
      }
    }

    // ── 마지막 행: 원 강조 + % 표시 ──
    if (isLast) {
      // 원 재그리기 — 팝 효과 + 잔상 완전 제거
      for (let i = 0; i < rN; i++) {
        const x = sx + i * CELL;
        const pad = 6;
        // 팝 크기
        const popR = R_LAST * 1.15;
        // 팝 전 영역 완전 초기화
        ctx.clearRect(x - popR - pad, cy - popR - pad, (popR + pad)*2, (popR + pad)*2);
        drawCircNum(ctx, x, cy, popR, nums[i], 0, true, p1c, p2c,
          `700 ${Math.round(popR * 0.78)}px 'Gaegu',cursive`);
        await sleep(50);
        // 팝 영역 완전 초기화 후 정상 크기로
        ctx.clearRect(x - popR - pad, cy - popR - pad, (popR + pad)*2, (popR + pad)*2);
        drawCircNum(ctx, x, cy, R_LAST, nums[i], 0, true, p1c, p2c,
          `700 ${Math.round(R_LAST * 0.78)}px 'Gaegu',cursive`);
        await sleep(40);
      }

      // % 텍스트: 원들 정중앙 아래
      await sleep(260);
      const pct   = nums[0]*10 + nums[1];
      const pctSz = Math.max(26, Math.min(38, W * 0.09));
      const pctY  = cy + R_LAST + pctSz * 0.75;
      ctx.save();
      ctx.font         = `700 ${pctSz}px 'Gaegu',cursive`;
      ctx.fillStyle    = '#e8306a';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor  = 'transparent'; ctx.shadowBlur = 0;
      // 마지막 원들의 실제 중앙 x 계산
      const lastSX  = sX(rN, true);
      const circCenterX = lastSX + (rN - 1) * CELL / 2;
      ctx.fillText(`= ${pct}%`, W / 2, pctY);
      ctx.restore();
    }
  }
}


// 원 + 숫자 그리기
function drawCircNum(ctx, x, y, r, num, person, isLast, p1c, p2c, font) {
  ctx.save();
  // shadow 완전 비활성화 (번짐 잔상 방지)
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur  = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  if (isLast) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, '#ff6b9d'); g.addColorStop(1, '#c9304e');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle   = person===1?'rgba(232,48,106,.13)':person===2?'rgba(199,125,255,.13)':'rgba(255,179,204,.18)';
    ctx.strokeStyle = person===1?p1c:person===2?p2c:'rgba(255,107,157,.55)';
    ctx.lineWidth   = 1.8;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  }
  ctx.font         = font;
  ctx.fillStyle    = isLast ? 'white' : (person===1?p1c:person===2?p2c:'rgba(80,30,50,.85)');
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num, x, y);
  ctx.restore();
}

// 아치 연결선
async function drawArcLine(ctx, x1, y1, x2, y2, mx, my) {
  const steps = 18;
  for (let s = 1; s <= steps; s++) {
    const pts = [];
    for (let k = 0; k <= s; k++) {
      const t = k / steps;
      pts.push([
        (1-t)*(1-t)*x1 + 2*(1-t)*t*mx + t*t*x2,
        (1-t)*(1-t)*y1 + 2*(1-t)*t*my + t*t*y2
      ]);
    }
    ctx.save();
    ctx.strokeStyle = 'rgba(255,107,157,.3)';
    ctx.lineWidth = 1.5; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0],pts[k][1]);
    ctx.stroke(); ctx.restore();
    await sleep(9);
  }
}

// 수직 화살표 애니메이션
async function drawStraightArrow(ctx, sx, sy, ex, ey) {
  const steps = 12;
  const dx = ex - sx, dy = ey - sy;
  for (let s = 1; s <= steps; s++) {
    const t = s / steps;
    ctx.save();
    ctx.strokeStyle = 'rgba(232,48,106,.72)';
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + dx*t, sy + dy*t);
    ctx.stroke();
    ctx.restore();
    await sleep(7);
  }
  // 화살촉
  const angle = Math.atan2(ey-sy, ex-sx);
  const hw = 4.5;
  ctx.save();
  ctx.fillStyle = 'rgba(232,48,106,.82)';
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex + Math.cos(angle+2.4)*hw*1.8, ey + Math.sin(angle+2.4)*hw*1.8);
  ctx.lineTo(ex + Math.cos(angle-2.4)*hw*1.8, ey + Math.sin(angle-2.4)*hw*1.8);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// 아치 연결선

function roundRect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) { ctx.roundRect(x,y,w,h,r); }
  else {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }
}

async function showText(ctx, text, x, y, font, color) {
  ctx.save();
  ctx.font = font; ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.restore();
}


function showResult(n1, n2, pct) {
  const data = getResult(pct, n1, n2);
  document.getElementById('rNames').innerHTML = `<span>${n1}</span> 💕 <span>${n2}</span>`;
  const numEl = document.getElementById('rPct');
  let cur = 0;
  const timer = setInterval(() => {
    cur = Math.min(cur + Math.max(1, Math.floor(pct / 30)), pct);
    numEl.textContent = cur;
    if (cur >= pct) clearInterval(timer);
  }, 28);
  const badge = document.getElementById('rBadge');
  badge.innerHTML = `${data.emoji} ${data.grade}`;
  badge.style.color = data.c; badge.style.background = data.bg; badge.style.borderColor = data.bc;
  document.getElementById('rComment').innerHTML = data.txt;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('adResult').style.display = 'block';
  document.getElementById('actionBtns').style.display = 'flex';
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'});
  if (pct >= 70) launchParticles();
}

function launchParticles() {
  const e=['💕','💖','✨','🌸','💗','⭐','🎊','💝'];
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='particle';
      el.textContent=e[Math.floor(Math.random()*e.length)];
      el.style.left=Math.random()*80+10+'%';el.style.top=Math.random()*40+30+'%';
      document.body.appendChild(el);setTimeout(()=>el.remove(),1500);
    },i*85);
  }
}
